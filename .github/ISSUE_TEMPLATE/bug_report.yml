name: Bug report
description: Report a problem with the rate limiter service
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: algorithm
    attributes:
      label: Algorithm in use
      options:
        - FIXED_WINDOW
        - SLIDING_WINDOW
        - TOKEN_BUCKET
        - Not sure
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Merchant RateLimitConfig
      description: The effective configuration (requestLimit, windowSizeSeconds, tokensPerSecond).
      render: json
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact requests / curl commands that trigger the issue.
      placeholder: |
        1. Create config ...
        2. Send N requests ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Application logs (include merchantId / algorithm lines if available).
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Service version or git commit SHA.
    validations:
      required: false
