version: 2
updates:
  # Gradle (Java) dependencies
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      testing:
        patterns:
          - "org.testcontainers*"
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
          - "org.awaitility*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci

  # Docker base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
